{% extends "base.html" %}
{% block content %}
<p style="margin:0 0 16px;font-size:16px;line-height:1.5;">Hi {{ display_name }},</p>

<p style="margin:0 0 16px;font-size:16px;line-height:1.5;">
  Congratulations — you just earned a new badge!
</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f5f7;border-radius:8px;padding:20px;margin:16px 0;">
  <tr>
    <td style="text-align:center;">
      <div style="font-size:22px;font-weight:600;color:#1d1d1f;margin-bottom:8px;">{{ badge_name }}</div>
      <div style="font-size:15px;color:#424245;line-height:1.5;">{{ badge_description }}</div>
    </td>
  </tr>
</table>

<p style="margin:24px 0 0;font-size:15px;line-height:1.5;">
  <a href="{{ app_url }}/u/{{ username }}" style="display:inline-block;background:#0071e3;color:#ffffff;text-decoration:none;padding:10px 18px;border-radius:8px;font-weight:500;">
    Share your profile
  </a>
</p>
{% endblock %}
